<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}PayTrack{% endblock %}</title>
  <style>
    /* ── Reset & base ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:   #2563EB;
      --red:    #DC2626;
      --green:  #16A34A;
      --slate50:#F8FAFC; --slate100:#F1F5F9; --slate200:#E2E8F0;
      --slate400:#94A3B8; --slate500:#64748B; --slate700:#334155; --slate900:#0F172A;
      --tg:     #2AABEE;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--slate50);
      color: var(--slate900);
      min-height: 100vh;
    }

    /* ── Nav ─────────────────────────────────────────────────────────── */
    nav {
      background: #fff;
      border-bottom: 1px solid var(--slate200);
      padding: 0 20px;
      display: flex;
      align-items: center;
      height: 56px;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 8px;
      font-weight: 700; font-size: 18px; text-decoration: none; color: inherit;
    }
    .nav-icon {
      width: 28px; height: 28px; background: var(--blue);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 14px; font-weight: 900;
    }
    .nav-links { display: flex; gap: 4px; margin-left: auto; }
    .nav-links a {
      text-decoration: none; color: var(--slate500); padding: 6px 12px;
      border-radius: 8px; font-size: 13px; font-weight: 500;
      transition: background .15s, color .15s;
    }
    .nav-links a:hover, .nav-links a.active { background: var(--slate100); color: var(--slate900); }

    /* ── Layout ──────────────────────────────────────────────────────── */
    .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

    /* ── Cards ───────────────────────────────────────────────────────── */
    .card {
      background: #fff; border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 20px;
      border: 1px solid var(--slate100);
    }

    /* ── Buttons ─────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 10px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer;
      text-decoration: none; transition: opacity .15s, transform .1s;
      line-height: 1.4;
    }
    .btn:hover { opacity: .88; }
    .btn:active { transform: scale(.97); }
    .btn-primary  { background: var(--blue);  color: #fff; }
    .btn-danger   { background: var(--red);   color: #fff; }
    .btn-success  { background: var(--green); color: #fff; }
    .btn-tg       { background: var(--tg);    color: #fff; }
    .btn-outline  {
      background: transparent; border: 1.5px solid var(--slate200);
      color: var(--slate700);
    }
    .btn-outline:hover { background: var(--slate100); }
    .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 8px; }
    .btn-block { width: 100%; justify-content: center; }

    /* ── Inputs ──────────────────────────────────────────────────────── */
    input, select {
      width: 100%; padding: 9px 12px; border: 1.5px solid var(--slate200);
      border-radius: 10px; font-size: 13px; color: var(--slate900);
      background: #fff; outline: none; transition: border-color .15s;
    }
    input:focus, select:focus { border-color: var(--blue); }
    label { font-size: 12px; font-weight: 600; color: var(--slate500);
            display: block; margin-bottom: 4px; letter-spacing: .4px; text-transform: uppercase; }
    .form-group { margin-bottom: 12px; }
    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    .input-row .form-group { flex: 1; margin-bottom: 0; }

    /* ── Flash ───────────────────────────────────────────────────────── */
    .flash {
      padding: 12px 16px; border-radius: 10px; font-size: 13px;
      font-weight: 500; margin-bottom: 16px;
    }
    .flash-success { background: #DCFCE7; color: #166534; }
    .flash-error   { background: #FEE2E2; color: #991B1B; }

    /* ── Table ───────────────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left; padding: 10px 12px; font-size: 11px; font-weight: 600;
      color: var(--slate500); letter-spacing: .5px; text-transform: uppercase;
      border-bottom: 1px solid var(--slate200);
    }
    td { padding: 12px 12px; border-bottom: 1px solid var(--slate100); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--slate50); }

    /* ── Pill / badge ────────────────────────────────────────────────── */
    .pill {
      display: inline-block; padding: 3px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 600; font-family: monospace;
    }
    .pill-blue   { background: #DBEAFE; color: #1D4ED8; }
    .pill-purple { background: #EDE9FE; color: #7C3AED; }
    .pill-green  { background: #DCFCE7; color: #166534; }
    .pill-red    { background: #FEE2E2; color: #991B1B; }
    .pill-gray   { background: var(--slate100); color: var(--slate500); }

    /* ── Misc ────────────────────────────────────────────────────────── */
    .mono { font-family: monospace; }
    .text-muted { color: var(--slate400); }
    .text-sm { font-size: 12px; }
    .text-xs { font-size: 11px; }
    .fw-700 { font-weight: 700; }
    .mb-8  { margin-bottom: 8px; }
    .mb-16 { margin-bottom: 16px; }
    .mb-24 { margin-bottom: 24px; }
    .mt-8  { margin-top: 8px; }
    .mt-16 { margin-top: 16px; }
    .flex  { display: flex; align-items: center; }
    .gap-8 { gap: 8px; }
    .gap-16{ gap: 16px; }
    .space-between { justify-content: space-between; }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: #DBEAFE; color: var(--blue);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px; font-family: monospace;
      flex-shrink: 0;
    }
    .section-title {
      font-size: 14px; font-weight: 700; margin-bottom: 16px;
      color: var(--slate700);
    }
    .divider { border: none; border-top: 1px solid var(--slate100); margin: 16px 0; }
    .empty-state {
      text-align: center; padding: 48px 24px; color: var(--slate400);
    }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media(max-width:600px){
      .grid-2 { grid-template-columns: 1fr; }
    }

    /* ── Search ──────────────────────────────────────────────────────── */
    .search-wrap { position: relative; }
    .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
                        width:16px; height:16px; color: var(--slate400); }
    .search-wrap input { padding-left: 34px; }

    /* ── Tab nav ─────────────────────────────────────────────────────── */
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--slate200);
            margin-bottom: 20px; }
    .tab-btn {
      padding: 9px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
      border: none; background: none; color: var(--slate500);
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color .15s, border-color .15s;
    }
    .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>
<nav>
  <a class="nav-brand" href="/">
    <div class="nav-icon">+</div>
    PayTrack
  </a>
  <div class="nav-links">
    <a href="/" {% if request.endpoint=='overview' %}class="active"{% endif %}>Overview</a>
    <a href="/upload" {% if request.endpoint=='upload_csv' %}class="active"{% endif %}>Upload CSV</a>
    <a href="/settings" {% if request.endpoint=='settings' %}class="active"{% endif %}>Settings</a>
  </div>
</nav>

<div class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash flash-{{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

{% block scripts %}{% endblock %}
</body>
</html>
